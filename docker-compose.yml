services:
  app:
    build: .
    ports:
      - "${PROD_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-compliance}:${POSTGRES_PASSWORD:-compliance}@db:5432/${POSTGRES_DB:-compliance}?schema=public
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - BETTER_AUTH_URL=${PROD_AUTH_URL:-https://cc.predictioninstitute.com}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles: [prod]

  app-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "${DEV_PORT:-3001}:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-compliance}:${POSTGRES_PASSWORD:-compliance}@db:5432/${POSTGRES_DB:-compliance}?schema=public
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - BETTER_AUTH_URL=${DEV_AUTH_URL:-http://localhost:3001}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "./node_modules/.bin/prisma db push --accept-data-loss && npm run dev"
    profiles: [dev]

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compliance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compliance}
      POSTGRES_DB: ${POSTGRES_DB:-compliance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compliance} -d ${POSTGRES_DB:-compliance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
